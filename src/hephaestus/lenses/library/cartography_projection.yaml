name: Cartographic Projection & Distortion
domain: cartography
subdomain: projection_theory

axioms:
  - "All map projections distort reality: Gauss's Theorema Egregium proves that no isometric (distance-preserving) mapping exists from a sphere to a plane — every flat representation of a curved surface must introduce systematic distortion in area, shape, distance, or direction."
  - "Distortion is a choice, not a flaw: the cartographer selects which properties to preserve and which to sacrifice based on the map's purpose — a navigation chart preserves angles (conformal); an equal-area map preserves relative sizes; no map preserves everything."
  - "Tissot's indicatrix quantifies distortion locally: at every point on a map, an infinitesimal circle on the globe becomes an ellipse whose axes indicate the direction and magnitude of stretching — distortion is continuously variable and can be measured point by point."
  - "Projection center determines perspective bias: azimuthal projections centered on the North Pole make Arctic distances accurate and Antarctic distances grotesque; every projection has a center of minimum distortion that privileges some locations over others."
  - "Scale varies within a single map: unlike a photograph, a map does not have a single uniform scale — the stated scale is true only along specific lines or points; elsewhere, the scale is stretched or compressed by the projection."
  - "Equivalent representations require different projections: the same underlying reality requires different maps depending on what question you are trying to answer — no single representation serves all analytical purposes."

structural_patterns:
  - name: inevitable_distortion_tradeoff
    abstract: Any representation that reduces dimensionality (maps a higher-dimensional reality onto a lower-dimensional surface) must introduce systematic distortion; the designer chooses which properties to preserve and which to sacrifice.
    maps_to: [dimensionality_reduction, representation_tradeoffs, lossy_projection, compression_distortion]

  - name: purpose_driven_projection_choice
    abstract: Different analytical purposes require different projections that preserve different properties; selecting a projection is selecting which distortions are acceptable — the representation must be chosen for the question, not assumed to be general-purpose.
    maps_to: [task_specific_representation, view_selection, analytical_framing, projection_matching]

  - name: tissot_distortion_measurement
    abstract: Distortion can be quantified at every point using a standard geometric indicator (the local ellipse of distortion), enabling systematic assessment of where and how much the representation deviates from reality.
    maps_to: [distortion_quantification, error_mapping, quality_assessment, local_accuracy_measurement]

  - name: center_of_projection_bias
    abstract: Every representation has a center of minimum distortion that privileges the region around it; the further from the center, the greater the distortion — the choice of center is an implicit claim about what matters most.
    maps_to: [perspective_bias, privileged_viewpoint, center_periphery_asymmetry, framing_effects]

  - name: non_uniform_scale
    abstract: A single stated scale or metric does not apply uniformly across the entire representation — actual accuracy varies by position, and consumers of the representation must understand that stated precision is local, not global.
    maps_to: [variable_precision, local_vs_global_accuracy, metric_non_uniformity, heterogeneous_resolution]

  - name: multiple_views_requirement
    abstract: No single representation can serve all analytical purposes; answering different questions about the same underlying reality requires generating different representations optimized for different properties.
    maps_to: [multi_view_design, complementary_representations, analytical_pluralism, view_composition]

injection_prompt: |
  Apply cartographic projection reasoning: any representation that reduces the dimensionality of reality introduces systematic distortion, and the critical question is not 'is there distortion?' (there always is) but 'which distortion has been chosen and is it appropriate for this purpose?' Identify the projection center — what region or perspective is privileged with minimum distortion, and what is pushed to the margins? Measure distortion locally using Tissot-style indicators: where exactly is the representation most and least accurate? Recognize that no single view serves all purposes — different questions require different projections of the same underlying data.
