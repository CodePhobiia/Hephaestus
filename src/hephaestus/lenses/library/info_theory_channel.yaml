name: Channel Capacity & Rate-Distortion
domain: information_theory
subdomain: channel_capacity

axioms:
  - "Shannon capacity is the maximum reliable transmission rate: for any noisy channel, there exists a maximum rate (measured in bits per channel use) below which arbitrarily reliable communication is possible and above which errors are inevitable — this limit cannot be exceeded by any coding scheme."
  - "Error-correcting codes trade redundancy for reliability: adding structured redundancy to a message allows receivers to detect and correct errors introduced by noise — the rate-reliability tradeoff is governed by the channel capacity, not by the specific error type."
  - "The data processing inequality: no processing of a signal can increase its information content about a source — every stage of processing either preserves or loses information, never creates it; information can only be destroyed, never generated by transformation."
  - "Rate-distortion theory quantifies the information cost of compression: there is a function R(D) giving the minimum bits per source symbol required to reconstruct the source within distortion D — trying to compress below R(D) necessarily increases distortion beyond D."
  - "Mutual information measures shared uncertainty reduction: I(X;Y) = how much knowing Y reduces uncertainty about X = how much knowing X reduces uncertainty about Y — it is symmetric and quantifies the information value of a communication channel."
  - "Channel capacity is achieved by matching source distribution to channel: the optimal input distribution for a channel is not uniform in general — it is the distribution that maximizes mutual information between input and output over the specific noise structure."

structural_patterns:
  - name: channel_capacity_bound
    abstract: Any communication system has a theoretical maximum reliable information rate determined by noise characteristics; this bound cannot be exceeded regardless of coding sophistication — design must account for it as a hard ceiling.
    maps_to: [throughput_limits, communication_capacity, theoretical_bound, noise_constrained_design]

  - name: redundancy_reliability_tradeoff
    abstract: Adding structured redundancy to information increases resilience to corruption at the cost of reduced throughput — the tradeoff is governed by channel capacity, and any code operating below capacity can achieve arbitrary reliability.
    maps_to: [error_correction, redundancy_design, fault_tolerance, reliability_throughput_tradeoff]

  - name: data_processing_inequality
    abstract: Any transformation of a signal cannot increase its information content about the source — processing can only preserve or reduce information, never increase it; every stage is a potential information bottleneck.
    maps_to: [information_loss_analysis, pipeline_bottleneck, irreversibility, lossy_transformation]

  - name: rate_distortion_compression_floor
    abstract: For any compression target, there is a minimum information rate below which reconstruction error must exceed a threshold — compressing below this floor necessarily sacrifices accuracy, and the tradeoff is captured by the rate-distortion function.
    maps_to: [compression_quality_tradeoff, lossy_encoding, fidelity_budget, approximation_limits]

  - name: mutual_information_channel_valuation
    abstract: The value of a communication link is measured by how much knowing the output reduces uncertainty about the input — this provides a single, source-and-noise-aware metric for comparing and optimizing communication paths.
    maps_to: [communication_link_value, sensor_utility, feature_relevance, information_gain]

  - name: input_distribution_optimization
    abstract: The maximum information throughput of a channel requires choosing the input distribution that best exploits the channel's specific noise structure — the optimal input is not obvious and depends on both signal and noise statistics jointly.
    maps_to: [transmission_optimization, adaptive_coding, channel_matched_design, capacity_achieving_distribution]

injection_prompt: |
  Reason from information theory: every communication system or inference pipeline has a Shannon capacity — a hard ceiling on reliable information throughput that no cleverness can exceed. Identify the bottlenecks using the data processing inequality: information can only be destroyed at each stage, never created; find where the most information is lost. Apply rate-distortion thinking: when you must compress, be explicit about the R(D) tradeoff — what accuracy are you sacrificing to achieve what compression? Measure the value of each input channel through mutual information: how much does this source reduce uncertainty about the target?
