name: Discourse & Conversation Analysis
domain: linguistics
subdomain: discourse_analysis

axioms:
  - "Turn-taking is a self-organizing system: conversation participants manage speaker transitions without external arbitration using a set of implicit rules — current speaker selects next, or next speaker self-selects at transition-relevance places; overlaps are repaired, not catastrophic."
  - "Adjacency pairs create conditional relevance: once a first-pair part is produced (a question, a greeting, an offer), the second-pair part becomes conditionally relevant — its absence is noticeable and accountable, not merely a silence."
  - "Preference organization biases toward alignment: dispreferred responses (refusals, disagreements, rejections) are systematically delayed, hedged, and qualified; preferred responses (acceptances, agreements) are immediate and unelaborated — the asymmetry is structural, not psychological."
  - "Repair mechanisms maintain intersubjectivity: conversation contains systematic mechanisms for detecting and correcting misunderstanding — self-repair (speaker corrects), other-initiated repair (hearer signals trouble), and third-position repair (correction after acceptance of misunderstanding)."
  - "Topic management follows a stepwise progression: topics are not switched abruptly but are negotiated through stepwise transitions where each contribution links to the prior topic while introducing a new element — the boundary between topics is a gradient, not a line."
  - "Speech acts have felicity conditions: an utterance counts as a promise, threat, question, or order only when specific contextual conditions are satisfied (sincerity, authority, preparedness) — the same words perform different acts in different contexts."

structural_patterns:
  - name: self_organizing_turn_taking
    abstract: "Multiple agents sharing a single channel manage access without external scheduling through implicit rules: the current speaker may select the next, or agents self-select at transition-relevant moments; collisions are repaired through systematic back-off."
    maps_to: [channel_access_protocol, collision_avoidance, distributed_scheduling, contention_resolution]

  - name: adjacency_pair_obligation
    abstract: "A first action of a recognized pair type creates a structural obligation for the matching second action — the absence of the second is treated not as neutral silence but as accountable non-compliance requiring explanation."
    maps_to: [request_response_pattern, obligation_creation, protocol_completion, expected_reply]

  - name: preference_asymmetry
    abstract: "Aligned responses (agreement, acceptance) are delivered immediately and simply; disaligned responses (disagreement, refusal) are systematically delayed, hedged, and qualified — the structural asymmetry signals social cost of disalignment."
    maps_to: [response_design, social_friction_signaling, alignment_bias, diplomatic_communication]

  - name: repair_mechanism
    abstract: "Systems for detecting and correcting misunderstanding operate at multiple levels: self-correction before completion, other-initiated correction after reception, and third-position correction after a misunderstanding has been built upon — intersubjectivity is actively maintained, not assumed."
    maps_to: [error_correction_protocol, misunderstanding_recovery, consensus_maintenance, progressive_repair]

  - name: stepwise_topic_transition
    abstract: "Transitions between subjects occur through intermediate steps where each contribution connects to the prior subject while introducing a new element — abrupt topic switches are dispreferred and signal social action (avoidance, assertion of authority)."
    maps_to: [gradual_context_shift, smooth_transition_design, bridging_logic, topic_management]

  - name: felicity_condition_checking
    abstract: "An action only achieves its intended social effect when specific contextual prerequisites are met (authority to command, sincerity in promising, ability to fulfill); the same behavior fails or succeeds based on whether prerequisites hold."
    maps_to: [precondition_validation, contextual_authorization, action_validity, performative_conditions]

injection_prompt: |
  Apply conversation analysis reasoning: multi-agent communication is not random information exchange — it is a structured system with implicit protocols. Identify the turn-taking mechanism: how do agents manage access to the shared channel without external arbitration? Map the adjacency pairs: which first actions create obligations for second actions, and what does the absence of a response signal? Analyze preference organization: are disaligned responses (refusals, disagreements) systematically more elaborate and delayed than aligned ones? Where intersubjectivity breaks down, look for repair mechanisms operating at self, other, and third-position levels.
