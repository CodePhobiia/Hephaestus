name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_DEFAULT: "3.12"

jobs:
  compile:
    name: Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
      - run: python -m compileall -q src tests web

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
      - run: pip install ruff
      - run: ruff check src/ web/ tests/

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
      - run: pip install -e ".[dev]"
      - run: python -m mypy src/hephaestus --ignore-missing-imports

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
      - run: pip install pip-audit
      - run: pip install -e ".[dev,web]"
      - run: pip-audit --strict --desc on

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev,web]"
      - run: python -m pytest tests/ -v --tb=short -x
        env:
          HEPHAESTUS_OFFLINE_CI: "1"

  container:
    name: Container Build & Smoke
    runs-on: ubuntu-latest
    needs: [compile, lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build container
        run: docker build -t hephaestus:ci .
      - name: Smoke test — container starts and health endpoint responds
        run: |
          docker run -d --name heph-smoke -p 8000:8000 hephaestus:ci
          sleep 10
          curl -sf http://localhost:8000/api/health || (docker logs heph-smoke && exit 1)
          docker stop heph-smoke
          docker rm heph-smoke
